{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NCN</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}?v=2.1">
</head>
<body>
    <div class="login-page">
        <div class="login-backdrop" aria-hidden="true">
            <div class="login-bg-slide is-active" style="background-image: url('{% static 'img/ncn_login_facade.jpg' %}');"></div>
            <div class="login-bg-slide" style="background-image: url('{% static 'img/ncn_login_interior.jpg' %}');"></div>
            <div class="login-bg-slide" style="background-image: url('{% static 'img/ncn_login_area.jpg' %}');"></div>
        </div>
        <div class="login-overlay"></div>

        <main class="login-shell">
            <div class="login-box">
                <div class="logo-area">
                    <h1><span>NCN</span></h1>
                    <p class="logo-tagline">Ingresa tus credenciales.</p>
                </div>

                {% if form.errors %}
                <div class="error-msg">
                    Usuario o contraseña incorrectos. Verifica tus datos.
                </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="id_username">Usuario</label>
                        <input type="text" name="username" id="id_username" required autofocus placeholder="Ej. ncn">
                    </div>

                    <div class="form-group">
                        <label for="id_password">Contraseña</label>
                        <input type="password" name="password" id="id_password" required placeholder="Ej. 123456">
                    </div>

                    <button type="submit" class="btn-submit">Ingresar</button>
                    <input type="hidden" name="next" value="{{ next }}">
                </form>
            </div>
        </main>
    </div>
    <script src="{% static 'js/login.js' %}?v=1.1"></script>
</body>
</html>
