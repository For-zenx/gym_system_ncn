{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfect Line II — Enrolamiento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tablet.css' %}?v=1.8">
</head>
<body>

    <video id="camera-feed" class="hidden" autoplay playsinline muted></video>
    <canvas id="overlay-canvas" class="hidden"></canvas>

    <div id="idle-overlay" class="idle-overlay">
        <div class="idle-brand">Perfect <span>Line II</span></div>
        <p class="idle-title">Tablet de Enrolamiento</p>
        <p class="idle-subtitle">Conectada — en espera del encargado en caja</p>
    </div>

    <div id="overlay-brand" class="overlay">
        Perfect <span>Line II</span>
    </div>

    <div id="overlay-status" class="overlay">
        <div id="status-dot"></div>
        <span id="status-text">Conectando...</span>
    </div>

    <div id="face-guide" class="face-guide">
        <div class="face-guide-oval"></div>
    </div>

    <div id="hud-instruction" class="hud-bubble hidden">
        <span id="hud-text">Cargando...</span>
    </div>

    <script>
        window.TABLET_WS_URL = "{{ ws_url }}";
    </script>
    <script src="{% static 'vendor/face-api.min.js' %}"></script>
    <script src="{% static 'js/tablet_face_utils.js' %}?v=1.0"></script>
    <script src="{% static 'js/tablet_enrollment.js' %}?v=1.6"></script>
</body>
</html>
