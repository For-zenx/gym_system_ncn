{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NCN Gym — Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tablet.css' %}?v=2.3">
</head>
<body class="tablet-access-body">

    <video id="camera-feed" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>

    <div id="overlay-brand" class="overlay">
        NCN <span>Gym</span>
    </div>

    <div id="overlay-status" class="overlay">
        <div id="status-dot"></div>
        <span id="status-text">Conectando...</span>
    </div>

    <div id="face-guide" class="face-guide face-guide-access active">
        <div class="face-guide-oval access-guide-oval"></div>
    </div>

    <div id="access-bottom-banner" class="access-bottom-banner hidden" role="status">
        <p id="access-banner-title" class="access-banner-title"></p>
        <p id="access-banner-subtitle" class="access-banner-subtitle"></p>
    </div>

    <div id="hud-instruction" class="hud-bubble">
        <span id="hud-text">Coloque su rostro en el óvalo</span>
    </div>

    <div id="access-processing-overlay" class="access-processing-overlay hidden" aria-live="polite">
        <div class="spinner"></div>
        <p id="access-processing-label" class="access-processing-label">Verificando…</p>
    </div>

    <script>
        window.TABLET_WS_URL = "{{ ws_url }}";
    </script>
    <script src="{% static 'vendor/face-api.min.js' %}"></script>
    <script src="{% static 'js/tablet_face_utils.js' %}?v=1.1"></script>
    <script src="{% static 'js/tablet_access.js' %}?v=2.5"></script>
</body>
</html>
